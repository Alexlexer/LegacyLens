name: dotnet-ci

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  build-test:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: LegacyLens/ui/package-lock.json

      - name: Install frontend dependencies
        working-directory: LegacyLens/ui
        run: npm ci

      - name: Build frontend
        working-directory: LegacyLens/ui
        run: npm run build

      - name: Restore
        working-directory: LegacyLens
        run: dotnet restore

      - name: Build
        working-directory: LegacyLens
        run: dotnet build --configuration Release --no-restore

      - name: Test
        working-directory: LegacyLens
        run: dotnet test --configuration Release --no-build

      - name: Format
        working-directory: LegacyLens
        run: dotnet format --verify-no-changes
